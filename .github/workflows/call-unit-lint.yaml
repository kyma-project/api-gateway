# Jobs defined in this file are responsible for things that do not require container image
# but still relevant to the codebase such as unit tests, linting etc

name: Pull Request unit, integration & lint

permissions:
  contents: read
  code-quality: write

on:
  workflow_call:

jobs:
  lint:
    name: Golang lint check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
          cache: false # We need to disable caching here, since this is handled by the golangci-lint action
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a #v9.3.0
        with:
          version: 'latest'
          args: --timeout=10m --verbose

  check-manifests:
    name: Check generate and manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - run: |
          ./hack/check_manifests_generate.sh
        shell: bash
      - name: Upload generated manifest diff
        uses: actions/upload-artifact@v7
        with:
          name: generated-manifest-diff
          path: git-diff.diff
        if: failure()

  run-unit-tests:
    name: Run unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'
      - name: Run tests
        run: make test
      - name: Convert coverage to Cobertura XML
        run: go tool gocover-cobertura < cover.out > coverage.xml
      - name: Upload coverage report
        # Skip on PRs from forks - upload-code-coverage requires write permission which forks don't get.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-code-coverage@82c7aee3fb2ad768e00b00a0a8d749c5815085b6 # v1
        with:
          file: coverage.xml
          language: Go
          label: unit-tests
          fail-on-error: false
